name: Keep Streamlit Apps Awake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  wake-apps:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Visit apps like a real browser
        run: |
          python - <<'EOF'
          from playwright.sync_api import sync_playwright

          urls = [
              "https://enjoy-stats-binomial-distribution.streamlit.app/",
              "https://enjoy-stats-poisson-link.streamlit.app/",
              "https://enjoy-stats-discrete-uniform-app.streamlit.app",
              "https://enjoy-stats-continuous-uniform-link.streamlit.app/",
              "https://enjoy-stats-normal-link.streamlit.app/",
          ]

          with sync_playwright() as p:
              browser = p.chromium.launch()
              for url in urls:
                  page = browser.new_page()
                  print(f"\n--- Visiting {url} ---")
                  try:
                      page.goto(url, timeout=60000, wait_until="networkidle")
                  except Exception as e:
                      print(f"  goto failed/timed out: {e}")

                  page.wait_for_timeout(5000)

                  # Check if the sleep screen is showing
                  sleep_text_visible = page.get_by_text("This app has gone to sleep").is_visible()
                  print(f"  Sleep screen visible: {sleep_text_visible}")

                  if sleep_text_visible:
                      try:
                          wake_button = page.get_by_role("button", name="Yes, get this app back up!")
                          wake_button.click(timeout=10000)
                          print("  Clicked wake button, waiting for app to spin up...")
                          page.wait_for_timeout(30000)  # give it a full 30s to boot
                      except Exception as e:
                          print(f"  Could not click wake button: {e}")
                  else:
                      print("  App was already awake.")

                  # Final check
                  still_sleeping = page.get_by_text("This app has gone to sleep").is_visible()
                  print(f"  Still sleeping after wait: {still_sleeping}")

                  page.close()
              browser.close()
          EOF
